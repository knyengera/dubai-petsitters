# Supabase local development config
# See: https://supabase.com/docs/guides/cli/config

project_id = "petsitters"

[api]
enabled = true
port = 54321

[db]
port = 54322
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
enable_signup = true
enable_confirmations = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"
redirect_uri = ""

[auth.sms]
enable_signup = true
enable_confirmations = true
provider = "twilio"
twilio_account_sid = "env(TWILIO_ACCOUNT_SID)"
twilio_auth_token = "env(TWILIO_AUTH_TOKEN)"
twilio_message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"

# Custom branded auth via Twilio Email + SMS (requires AUTH_HOOK_SECRET in env)
[auth.hook.send_email]
enabled = true
uri = "http://host.docker.internal:3000/api/auth/hooks/send-email"
secrets = "env(AUTH_HOOK_SECRET)"

[auth.hook.send_sms]
enabled = true
uri = "http://host.docker.internal:3000/api/auth/hooks/send-sms"
secrets = "env(AUTH_HOOK_SECRET)"
